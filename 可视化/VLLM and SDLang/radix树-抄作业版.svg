<svg width="680" viewBox="0 0 680 432" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, 'Segoe UI', 'Microsoft YaHei', sans-serif">
<title>RadixAttention 抄作业版示意图</title>
<desc>相同开头（分析、轴承）只算一次、大家复印复用 KV；各自不同的结尾各自 prefill；显存满时先淘汰没人共享的叶子，公共前缀受保护。</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<style>
.title{font-size:15px;font-weight:500;fill:#2C2C2A}
.lbl{font-size:13px;fill:#5F5E5A}
.nt{font-size:13px;font-weight:500}
.ns{font-size:11px}
.teal rect{fill:#E1F5EE;stroke:#0F6E56}.teal .nt{fill:#04342C}.teal .ns{fill:#0F6E56}
.purple rect{fill:#EEEDFE;stroke:#534AB7}.purple .nt{fill:#26215C}.purple .ns{fill:#534AB7}
.gray rect{fill:#F1EFE8;stroke:#888780}.gray .nt{fill:#2C2C2A}
.amber rect{fill:#FAEEDA;stroke:#BA7517}.amber .nt{fill:#412402}.amber .ns{fill:#854F0B}
</style>

<text class="title" x="12" y="20">RadixAttention：相同开头只算一次（抄作业版）</text>

<g class="gray"><rect x="300" y="32" width="80" height="26" rx="5"/><text class="nt" x="340" y="49" text-anchor="middle">三个请求</text></g>
<line x1="340" y1="58" x2="340" y2="92" stroke="#5F5E5A" marker-end="url(#arrow)"/>
<text class="lbl" x="348" y="80">分析</text>

<g class="teal"><rect x="276" y="92" width="128" height="46" rx="8"/><text class="nt" x="340" y="112" text-anchor="middle">分析</text><text class="ns" x="340" y="128" text-anchor="middle">公共开头·只算一次</text></g>
<line x1="340" y1="138" x2="222" y2="196" stroke="#5F5E5A" marker-end="url(#arrow)"/>
<line x1="340" y1="138" x2="470" y2="196" stroke="#5F5E5A" marker-end="url(#arrow)"/>
<text class="lbl" x="262" y="172" text-anchor="end">轴承</text>
<text class="lbl" x="418" y="172">齿轮磨损</text>

<g class="teal"><rect x="160" y="196" width="120" height="46" rx="8"/><text class="nt" x="220" y="216" text-anchor="middle">轴承</text><text class="ns" x="220" y="232" text-anchor="middle">R1·R3 共享·复印</text></g>
<g class="purple"><rect x="410" y="196" width="130" height="46" rx="8"/><text class="nt" x="475" y="216" text-anchor="middle">齿轮磨损 → R2</text><text class="ns" x="475" y="232" text-anchor="middle">只算这段</text></g>

<line x1="220" y1="242" x2="152" y2="300" stroke="#5F5E5A" marker-end="url(#arrow)"/>
<line x1="220" y1="242" x2="290" y2="300" stroke="#5F5E5A" marker-end="url(#arrow)"/>
<text class="lbl" x="176" y="276" text-anchor="end">故障</text>
<text class="lbl" x="256" y="276">寿命</text>

<g class="purple"><rect x="92" y="300" width="116" height="46" rx="8"/><text class="nt" x="150" y="320" text-anchor="middle">故障 → R1</text><text class="ns" x="150" y="336" text-anchor="middle">只算这段</text></g>
<g class="purple"><rect x="232" y="300" width="116" height="46" rx="8"/><text class="nt" x="290" y="320" text-anchor="middle">寿命 → R3</text><text class="ns" x="290" y="336" text-anchor="middle">只算这段</text></g>

<g class="amber"><rect x="392" y="276" width="276" height="70" rx="8"/><text class="ns" x="406" y="298">抽屉满了要腾地方：</text><text class="ns" x="406" y="316">先扔没人共享的叶子（如「故障」），</text><text class="ns" x="406" y="334">公共部分「分析」「轴承」有人用，留到最后。</text></g>

<rect x="12" y="372" width="656" height="48" rx="8" fill="#F1EFE8"/>
<rect x="26" y="386" width="14" height="12" rx="3" fill="#E1F5EE" stroke="#0F6E56"/>
<text class="lbl" x="46" y="396">绿色 = 大家复印的公共开头（KV 直接复用，省去重算）</text>
<rect x="26" y="402" width="14" height="12" rx="3" fill="#EEEDFE" stroke="#534AB7"/>
<text class="lbl" x="46" y="412">紫色 = 各请求独有的结尾（只有这部分要自己算 prefill）</text>
</svg>
